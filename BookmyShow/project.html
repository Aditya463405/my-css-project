<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
     <header>
        <div class="head">
            <div class="logo">

                <div class="left"> <h1>BookMyShow</h1></div>
                <div class="right">
                    <button>Movies</button>
                    <button>Events</button>
                    <button>Sports</button>
                    <button>More</button>
                </div>

            </div>
            <div class="search">
                <input type="text" name="search" class="searching" placeholder="search for movies and events">
                <button>search</button>
            </div>
        </div>
     </header>

     <main>
        <div class="hero">
            <h2>Expericence the best movie Content</h2>
            <button>Book Now</button>
        </div>

        <div class="mover">
            <h2>Popular Movies</h2>
        </div>

        <div class="movie">
            <div class="card">
                <img src="./img1.webp" alt="Dhurandhar" class="images">
                <h3>Dhurandhar</h3>
            </div>

            <div class="card">
                <img src="./img2.webp" alt="Bhooth Bangla" class="images">
                <h3>Bhooth Bangla</h3>
            </div>

            <div class="card">
                <img src="./img3.webp" alt="Dacoit" class="images">
                <h3>DACOIT</h3>
            </div>

            <div class="card">
                <img src="./img4.webp" alt="Project Hail Mary" class="images">
                <h3>Project Hail Mary</h3>
            </div>

            <div class="card">
                <img src="./img5.webp" alt="super duperr" class="images">
                <h3>super duperr</h3>
            </div>

            <div class="card">
                <img src="./img6.webp" alt="Mario Galaxy" class="images">
                <h3>Mario Galaxy</h3>
            </div>

            <div class="card">
                <img src="./img7.webp" alt="Tighi" class="images">
                <h3>Tighi</h3>
            </div>

            <div class="card">
                <img src="./img8.webp" alt="The Mummy" class="images">
                <h3>The Mummy</h3>
            </div>
        </div>

        <div class="bot">
                <img src="./bottom.avif" alt="" class="img">
        </div>
     </main>


</body>
</html>
